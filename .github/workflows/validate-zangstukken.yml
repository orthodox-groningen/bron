name: Validate zangstukken

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate VSA zangstukken
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bron repository
        uses: actions/checkout@v4

      - name: Checkout VSA-tooling
        uses: actions/checkout@v4
        with:
          repository: orthodox-groningen/VSA-tooling
          path: vendor/vsa-tooling
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install VSA tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e vendor/vsa-tooling

      - name: Validate zangstukken
        run: vsa validate zangstukken
