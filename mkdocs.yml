site_name: bron — documentatie
site_description: Documentatie van de centrale bronrepository voor orthodoxe kerkmuziek (VSA)
site_url: https://orthodox-groningen.github.io/bron/
repo_url: https://github.com/orthodox-groningen/bron
repo_name: orthodox-groningen/bron
edit_uri: edit/main/docs/

theme:
  name: material
  language: nl
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Specificaties:
    - specs/index.md
    - specs/inhoudslevenscyclus.md
    - specs/repo-structuur.md
    - specs/zangstuk-formaat.md
  - Handleidingen:
    - manuals/index.md
    - manuals/github-pages-setup.md
    - manuals/zangstuk-toevoegen.md
    - manuals/bronvariant-toevoegen.md
    - manuals/copyright-access.md
  - Referentie:
    - reference/index.md
    - reference/conversiemechanismen.md
    - reference/exportcontracten.md
    - reference/brontypes-validatie.md
  - Plannen:
    - plans/README.md
    - plans/samenvatting-project.md

extra_css:
  - stylesheets/extra.css

extra:
  preview: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/orthodox-groningen/bron
      name: bron op GitHub
    - icon: fontawesome/solid/code
      link: https://orthodox-groningen.github.io/VSA-tooling/
      name: VSA-tooling demosite
